        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',

            height: 300px;

</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-8">
            <a href="../index.html" class="text-primary hover:underline mb-4 inline-block">
                <i class="fa fa-arrow-left mr-2"></i>返回首页
            </a>
            <h1 class="text-3xl font-bold text-gray-800">LTV计算</h1>
            <p class="text-gray-600 mt-2">计算用户生命周期价值，预测第30天LTV</p>
        </header>

        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">数据预览</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">user_id</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">reg_date</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">order_date</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">amount</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="data-preview">
                        <!-- 数据将通过JavaScript动态填充 -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">代码编辑器</h2>
                <div>
                    <button id="run-btn" class="bg-primary text-white px-4 py-2 rounded-md hover:bg-blue-600 mr-2">
                        <i class="fa fa-play mr-1"></i>运行
                    </button>
                    <button id="answer-btn" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-300">
                        <i class="fa fa-lightbulb-o mr-1"></i>参考答案
                    </button>
                </div>
            </div>
            <textarea id="code-editor"># LTV计算
# 计算用户生命周期价值，预测第30天LTV

import pandas as pd
import numpy as np

# 转换日期格式
df['reg_date'] = pd.to_datetime(df['reg_date'])
df['order_date'] = pd.to_datetime(df['order_date'])

# 计算用户注册到购买的天数
df['days_since_reg'] = (df['order_date'] - df['reg_date']).dt.days

# 计算每个用户的累计消费
total_spend = df.groupby('user_id')['amount'].sum().reset_index()
total_spend.columns = ['user_id', 'total_amount']

# 计算每个用户的活跃天数
active_days = df.groupby('user_id')['days_since_reg'].nunique().reset_index()
active_days.columns = ['user_id', 'active_days']

# 合并数据
user_ltv = pd.merge(total_spend, active_days, on='user_id')

# 计算平均每日消费
user_ltv['avg_daily_spend'] = user_ltv['total_amount'] / user_ltv['active_days']

# 预测第30天LTV（简单线性预测）
user_ltv['predicted_30day_ltv'] = user_ltv['avg_daily_spend'] * 30

# 计算整体平均LTV
average_ltv = user_ltv['predicted_30day_ltv'].mean()
print(f"平均30天预测LTV: {average_ltv:.2f}")

# 显示结果
print("\n用户LTV预测：")
print(user_ltv)

# 存储结果以便显示
df_names = ['user_ltv']
</textarea>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">输出结果</h2>
            <div class="bg-gray-50 p-4 rounded-md output-area" id="output"></div>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4">数据表格</h2>
            <div id="table-output"></div>
        </div>
    </div>

    <script>
        // 示例CSV数据
        const csvData = `user_id,reg_date,order_date,amount
1,2023-09-01,2023-09-01,100
1,2023-09-01,2023-09-05,150
1,2023-09-01,2023-09-10,200
2,2023-09-02,2023-09-02,120
2,2023-09-02,2023-09-06,180
3,2023-09-03,2023-09-03,200
3,2023-09-03,2023-09-09,150
4,2023-09-04,2023-09-04,80
4,2023-09-04,2023-09-12,160
5,2023-09-05,2023-09-05,140
5,2023-09-05,2023-09-15,180
6,2023-09-06,2023-09-06,110
6,2023-09-06,2023-09-18,190
7,2023-09-07,2023-09-07,170
8,2023-09-08,2023-09-08,100
8,2023-09-08,2023-09-20,150
9,2023-09-09,2023-09-09,160
10,2023-09-10,2023-09-10,120
10,2023-09-10,2023-09-25,180`;

        // 初始化CodeMirror编辑器
        const editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
            mode: 'python',
            theme: 'monokai',
            lineNumbers: true,
            indentUnit: 4,
            tabSize: 4,
            autofocus: false
        });

        // 加载保存的代码
        const projectId = '09_ltv_calculation';
        const savedCode = loadCode(projectId);
        if (savedCode) {
            editor.setValue(savedCode);
        }

        // 填充数据预览
        function populateDataPreview() {
            const rows = csvData.split('\n');
            const headers = rows[0].split(',');
            const tbody = document.getElementById('data-preview');
            
            // 显示前5行数据
            for (let i = 1; i < Math.min(rows.length, 6); i++) {
                const rowData = rows[i].split(',');
                const tr = document.createElement('tr');
                
                for (const value of rowData) {
                    const td = document.createElement('td');
                    td.className = 'px-6 py-4 whitespace-nowrap text-sm text-gray-500';
                    td.textContent = value;
                    tr.appendChild(td);
                }
                
                tbody.appendChild(tr);
            }
        }

        // 运行按钮点击事件
        document.getElementById('run-btn').addEventListener('click', async () => {
            const code = editor.getValue();
            const outputElement = document.getElementById('output');
            const tableElement = document.getElementById('table-output');
            
            // 保存代码
            saveCode(projectId, code);
            
            // 准备代码（添加数据加载）
            const fullCode = prepareCodeWithData(code, csvData);
            
            // 运行代码
            outputElement.textContent = '运行中...';
            await runCode(fullCode, outputElement, tableElement);
        });

        // 参考答案按钮点击事件
        document.getElementById('answer-btn').addEventListener('click', () => {
            const answerCode = `# LTV计算

            editor.setValue(answerCode);
            saveCode(projectId, answerCode);
        });

        // 初始化
        async function init() {
            // 初始化Pyodide
            await initializePyodide();
            // 填充数据预览
            populateDataPreview();
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
