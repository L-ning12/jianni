</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-8">
            <a href="../index.html" class="text-primary hover:underline mb-4 inline-block">
                <i class="fa fa-arrow-left mr-2"></i>返回首页
            </a>
            <h1 class="text-3xl font-bold text-gray-800">行为序列特征</h1>
            <p class="text-gray-600 mt-2">分析用户行为序列，计算访问间隔时间</p>
        </header>

        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">数据预览</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">user_id</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">date</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">action</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="data-preview">
                        <!-- 数据将通过JavaScript动态填充 -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">代码编辑器</h2>
                <div>
                    <button id="run-btn" class="bg-primary text-white px-4 py-2 rounded-md hover:bg-blue-600 mr-2">
                        <i class="fa fa-play mr-1"></i>运行
                    </button>
                    <button id="answer-btn" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-300">
                        <i class="fa fa-lightbulb-o mr-1"></i>参考答案
                    </button>
                </div>
            </div>
            <textarea id="code-editor"># 行为序列特征分析
# 计算用户访问间隔时间

import pandas as pd

# 转换日期格式
df['date'] = pd.to_datetime(df['date'])

# 按用户分组，计算访问间隔
user_sequences = []

for user_id, user_data in df.groupby('user_id'):
    # 按日期排序
    user_data = user_data.sort_values('date')
    
    # 计算访问间隔（天）
    user_data['time_diff'] = user_data['date'].diff().dt.days
    
    # 填充第一个值为0
    user_data['time_diff'] = user_data['time_diff'].fillna(0)
    
    # 计算行为序列长度
    user_data['sequence_length'] = len(user_data)
    
    user_sequences.append(user_data)

# 合并结果
result = pd.concat(user_sequences)

# 计算每个用户的平均访问间隔
user_stats = result.groupby('user_id').agg({
    'time_diff': 'mean',
    'sequence_length': 'max'
}).rename(columns={
    'time_diff': 'avg_time_diff',
    'sequence_length': 'total_actions'
}).reset_index()

# 显示结果
print("用户行为序列统计：")
print(user_stats)

# 存储结果以便显示
df_names = ['result', 'user_stats']
</textarea>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">输出结果</h2>
            <div class="bg-gray-50 p-4 rounded-md output-area" id="output"></div>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4">数据表格</h2>
            <div id="table-output"></div>
        </div>
    </div>

        // 初始化CodeMirror编辑器
        const editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
            mode: 'python',
            theme: 'monokai',
            lineNumbers: true,
            indentUnit: 4,
            tabSize: 4,
            autofocus: false
        });

        // 加载保存的代码
        const projectId = '06_behavior_sequence';
        const savedCode = loadCode(projectId);
        if (savedCode) {
            editor.setValue(savedCode);
        }

        // 填充数据预览
        function populateDataPreview() {
            const rows = csvData.split('\n');
            const headers = rows[0].split(',');
            const tbody = document.getElementById('data-preview');
            
            // 显示前5行数据
            for (let i = 1; i < Math.min(rows.length, 6); i++) {
                const rowData = rows[i].split(',');
                const tr = document.createElement('tr');
                
                for (const value of rowData) {
                    const td = document.createElement('td');
                    td.className = 'px-6 py-4 whitespace-nowrap text-sm text-gray-500';
                    td.textContent = value;
                    tr.appendChild(td);
                }
                
                tbody.appendChild(tr);
            }
        }

        // 运行按钮点击事件
        document.getElementById('run-btn').addEventListener('click', async () => {
            const code = editor.getValue();
            const outputElement = document.getElementById('output');
            const tableElement = document.getElementById('table-output');
            
            // 保存代码
            saveCode(projectId, code);
            
            // 准备代码（添加数据加载）
            const fullCode = prepareCodeWithData(code, csvData);
            
            // 运行代码
            outputElement.textContent = '运行中...';
            await runCode(fullCode, outputElement, tableElement);
        });

        // 参考答案按钮点击事件
        document.getElementById('answer-btn').addEventListener('click', () => {

            editor.setValue(answerCode);
            saveCode(projectId, answerCode);
        });

        // 初始化
        async function init() {
            // 初始化Pyodide
            await initializePyodide();
            // 填充数据预览
            populateDataPreview();
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
