        const answerCode = `import pandas as pd
import io
from datetime import datetime

csv_data = """user_id,order_id,order_date,order_amount,product_count
U001,O001,2024-01-15,299,1
U001,O002,2024-02-20,598,2
U002,O003,2024-01-10,1599,1
U002,O004,2024-03-05,899,2
U003,O005,2024-03-01,199,1
U004,O006,2023-12-25,399,2
U004,O007,2024-01-28,299,1
U004,O008,2024-03-08,598,2
U005,O009,2023-11-20,899,1
U006,O010,2024-02-14,1299,1
U006,O011,2024-03-02,199,1
U007,O012,2024-01-05,399,1
U008,O013,2023-10-15,1599,1
U009,O014,2024-03-10,299,1
U010,O015,2024-01-25,499,1
U010,O016,2024-02-25,799,2
U011,O017,2024-03-03,199,1
U012,O018,2023-12-10,299,1
U012,O019,2024-01-30,599,2
U013,O020,2024-03-06,1599,1
U014,O021,2024-02-08,799,2
U015,O022,2023-11-30,399,1
U015,O023,2024-01-18,299,1
U016,O024,2024-03-09,199,1
U017,O025,2024-01-22,599,1
U018,O026,2024-02-28,1299,1
U019,O027,2024-03-04,299,1
U020,O028,2023-12-20,399,1
U020,O029,2024-02-15,799,2"""

df = pd.read_csv(io.StringIO(csv_data))
df['order_date'] = pd.to_datetime(df['order_date'])

# 假设分析日期是 2024-03-15
analysis_date = pd.to_datetime('2024-03-15')

print("=" * 50)
print("RFM用户分层分析报告")
print("=" * 50)

# 1. 计算RFM指标
rfm = df.groupby('user_id').agg(
    recency=('order_date', lambda x: (analysis_date - x.max()).days),
    frequency=('order_id', 'count'),
    monetary=('order_amount', 'sum')
).reset_index()

print("\\n1. RFM指标计算结果:")
print(rfm.to_string(index=False))

# 2. 对RFM进行打分（1-5分）
# Recency: 越小越好，所以分位数反转
rfm['r_score'] = pd.qcut(rfm['recency'], 5, labels=[5, 4, 3, 2, 1])
rfm['f_score'] = pd.qcut(rfm['frequency'].rank(method='first'), 5, labels=[1, 2, 3, 4, 5])
rfm['m_score'] = pd.qcut(rfm['monetary'], 5, labels=[1, 2, 3, 4, 5])

# 转换为整数
rfm[['r_score', 'f_score', 'm_score']] = rfm[['r_score', 'f_score', 'm_score']].astype(int)

# 计算RFM总分
rfm['rfm_score'] = rfm['r_score'] * 100 + rfm['f_score'] * 10 + rfm['m_score']

print("\\n2. RFM打分结果:")
print(rfm[['user_id', 'recency', 'frequency', 'monetary', 'r_score', 'f_score', 'm_score', 'rfm_score']].to_string(index=False))

# 3. 用户分层
def segment_user(row):
    r, f, m = row['r_score'], row['f_score'], row['m_score']
    if r >= 4 and f >= 4 and m >= 4:
        return '重要价值用户'
    elif r >= 4 and f < 4 and m >= 4:
        return '重要发展用户'
    elif r < 4 and f >= 4 and m >= 4:
        return '重要保持用户'
    elif r < 4 and f < 4 and m >= 4:
        return '重要挽留用户'
    elif r >= 4 and f >= 4 and m < 4:
        return '一般价值用户'
    elif r >= 4 and f < 4 and m < 4:
        return '一般发展用户'
    elif r < 4 and f >= 4 and m < 4:
        return '一般保持用户'
    else:
        return '一般挽留用户'

rfm['segment'] = rfm.apply(segment_user, axis=1)

print("\\n3. 用户分层结果:")
print(rfm[['user_id', 'rfm_score', 'segment']].to_string(index=False))

# 4. 统计各分层用户
segment_stats = rfm.groupby('segment').agg(
    user_count=('user_id', 'count'),
    total_amount=('monetary', 'sum'),
    avg_amount=('monetary', 'mean')
).reset_index()

# 按金额排序
segment_stats = segment_stats.sort_values('total_amount', ascending=False)

print("\\n4. 各分层用户统计:")
print(segment_stats.to_string(index=False))

print("\\n" + "=" * 50)
print("分析完成!")
print("=" * 50)
`;

        const parseCSV = (csv) => {
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',');
            const rows = lines.slice(1, 21).map(line => {
                const values = line.split(',');
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = values[index];
                });
                return obj;
            });
            return { headers, rows };
        };

                const output = ref([]);

                const isCompletedStatus = ref(isCompleted(projectId));
                const showAnswer = ref(false);

                const addOutput = (type, content) => {
                    output.value.push({
                        type,
                        content,
                        id: Date.now()
                    });
                };
                
                const handleRun = async () => {
                    isRunning.value = true;
                    output.value = [];
                    addOutput('info', '正在运行代码...');
                    
                    try {
                        await runCode(code.value, (result) => {
                            if (result.type === 'text') {
                                addOutput('text', result.content);
                            } else if (result.type === 'table') {
                                addOutput('table', result.content);
                            } else if (result.type === 'error') {
                                addOutput('error', result.content);
                            }
                        });
                    } catch (error) {
                        addOutput('error', String(error));
                    } finally {
                        isRunning.value = false;

                    code.value = defaultCode;

                            });
