import io

csv_data = """product_id,product_name,price,category,date
101,无线耳机,299,电子产品,2024-01-01
101,无线耳机,289,电子产品,2024-01-02
101,无线耳机,299,电子产品,2024-01-03
101,无线耳机,999,电子产品,2024-01-04

101,无线耳机,299,电子产品,2024-01-07
101,无线耳机,199,电子产品,2024-01-08
101,无线耳机,299,电子产品,2024-01-09
102,智能手表,1599,电子产品,2024-01-01
102,智能手表,1599,电子产品,2024-01-02
102,智能手表,1499,电子产品,2024-01-03
102,智能手表,1599,电子产品,2024-01-04
102,智能手表,2999,电子产品,2024-01-05
102,智能手表,1599,电子产品,2024-01-06
103,蓝牙音箱,499,电子产品,2024-01-01
103,蓝牙音箱,499,电子产品,2024-01-02
103,蓝牙音箱,489,电子产品,2024-01-03
103,蓝牙音箱,499,电子产品,2024-01-04

103,蓝牙音箱,29,电子产品,2024-01-06
104,运动手环,199,电子产品,2024-01-01
104,运动手环,199,电子产品,2024-01-02
104,运动手环,189,电子产品,2024-01-03
104,运动手环,199,电子产品,2024-01-04
104,运动手环,209,电子产品,2024-01-05
105,平板电脑,2499,电子产品,2024-01-01
105,平板电脑,2499,电子产品,2024-01-02
105,平板电脑,2399,电子产品,2024-01-03
105,平板电脑,2499,电子产品,2024-01-04
105,平板电脑,2599,电子产品,2024-01-05
105,平板电脑,99,电子产品,2024-01-06"""

df = pd.read_csv(io.StringIO(csv_data))

print("=" * 50)
print("价格异常检测分析报告")
print("=" * 50)

# 1. 使用IQR方法检测价格异常值
print("\\n1. 使用IQR方法检测价格异常值:")

Q1 = df['price'].quantile(0.25)
Q3 = df['price'].quantile(0.75)
IQR = Q3 - Q1

lower_bound_iqr = Q1 - 1.5 * IQR
upper_bound_iqr = Q3 + 1.5 * IQR

print(f"Q1: {Q1}, Q3: {Q3}, IQR: {IQR}")
print(f"正常价格范围: [{lower_bound_iqr:.2f}, {upper_bound_iqr:.2f}]")

anomalies_iqr = df[(df['price'] < lower_bound_iqr) | (df['price'] > upper_bound_iqr)]
print(f"\\nIQR方法检测到的异常值:")
print(anomalies_iqr[['product_name', 'price', 'date']].to_string(index=False))

# 2. 使用Z-score方法检测价格异常值
print("\\n2. 使用Z-score方法检测价格异常值 (阈值=3):")

df['z_score'] = (df['price'] - df['price'].mean()) / df['price'].std()

anomalies_zscore = df[np.abs(df['z_score']) > 3]
print(f"Z-score方法检测到的异常值:")
print(anomalies_zscore[['product_name', 'price', 'z_score', 'date']].to_string(index=False))

# 3. 按产品分组检测价格异常
print("\\n3. 按产品分组检测价格异常:")

def detect_product_anomalies(group):
    Q1 = group['price'].quantile(0.25)
    Q3 = group['price'].quantile(0.75)
    IQR = Q3 - Q1
    lower = Q1 - 1.5 * IQR
    upper = Q3 + 1.5 * IQR
    return group[(group['price'] < lower) | (group['price'] > upper)]

product_anomalies = df.groupby('product_id', group_keys=False).apply(detect_product_anomalies)
print(f"\\n按产品分组检测到的异常值:")
print(product_anomalies[['product_name', 'price', 'date']].to_string(index=False))

# 4. 统计异常值信息
print("\\n4. 异常值统计:")
print(f"总记录数: {len(df)}")
print(f"IQR方法检测到的异常数: {len(anomalies_iqr)}")
print(f"Z-score方法检测到的异常数: {len(anomalies_zscore)}")
print(f"按产品分组检测到的异常数: {len(product_anomalies)}")
print(f"\\n涉及的产品: {product_anomalies['product_name'].unique().tolist()}")

print("\\n" + "=" * 50)
print("分析完成!")
print("=" * 50)
`;

        const parseCSV = (csv) => {
            const lines = csv.trim().split('\n');

                const values = line.split(',');
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = values[index];
                });
                return obj;

            return { headers, rows };
