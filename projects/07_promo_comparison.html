                    <textarea id="code-editor"># 促销活动对比分析
# 对比促销活动与非促销活动的销售情况

import pandas as pd

# 转换日期格式
df['date'] = pd.to_datetime(df['date'])

# 按促销活动状态分组分析
promo_analysis = df.groupby('is_promo').agg({
    'amount': ['mean', 'sum', 'count'],
    'user_id': 'nunique'
}).reset_index()

# 重命名列
promo_analysis.columns = ['is_promo', 'avg_amount', 'total_amount', 'order_count', 'unique_users']

# 计算转化率（订单数/用户数）
promo_analysis['conversion_rate'] = promo_analysis['order_count'] / promo_analysis['unique_users']

# 按周分组分析促销效果
df['week'] = df['date'].dt.isocalendar().week
df['year'] = df['date'].dt.isocalendar().year

weekly_analysis = df.groupby(['year', 'week', 'is_promo']).agg({
    'amount': 'sum',
    'order_count': 'count',
    'unique_users': 'nunique'
}).reset_index()

# 显示结果
print("促销活动与非促销活动对比：")
print(promo_analysis)

print("\n每周促销效果：")
print(weekly_analysis)

# 存储结果以便显示
df_names = ['promo_analysis', 'weekly_analysis']
</textarea>

        // 加载保存的代码
        const projectId = '07_promo_comparison';
        const savedCode = loadCode(projectId);
        if (savedCode) {
            editor.setValue(savedCode);
        }

        // 填充数据预览
        function populateDataPreview() {
            const rows = csvData.split('\n');
            const headers = rows[0].split(',');
            const tbody = document.getElementById('data-preview');
            
            // 显示前5行数据
            for (let i = 1; i < Math.min(rows.length, 6); i++) {
                const rowData = rows[i].split(',');
                const tr = document.createElement('tr');
                
                // 只显示前4列，避免表格太宽
                for (let j = 0; j < Math.min(rowData.length, 4); j++) {
                    const td = document.createElement('td');

        document.getElementById('run-btn').addEventListener('click', async () => {
