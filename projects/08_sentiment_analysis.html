# 分析用户评论的情感倾向，计算评分相关性

import pandas as pd
import numpy as np

# 简单的情感分析函数
def simple_sentiment_analysis(text):
    # 正面词汇
    positive_words = ['好', '满意', '喜欢', '棒', '优秀', '完美', '赞', '推荐', '舒服', '实惠']
    # 负面词汇
    negative_words = ['差', '失望', '不喜欢', '糟糕', '差', '贵', '慢', '麻烦', '失望', '不满意']
    
    text = str(text).lower()
    positive_score = sum(1 for word in positive_words if word in text)
    negative_score = sum(1 for word in negative_words if word in text)
    
    # 计算情感得分
    sentiment_score = positive_score - negative_score
    return sentiment_score

# 应用情感分析
df['sentiment_score'] = df['comment_text'].apply(simple_sentiment_analysis)

# 计算评分与情感得分的相关性
correlation = df['rating'].corr(df['sentiment_score'])
print(f"评分与情感得分的相关性: {correlation:.4f}")

# 分析不同评分的情感分布
rating_sentiment = df.groupby('rating').agg({
    'sentiment_score': ['mean', 'std', 'count']
}).reset_index()

# 显示结果
print("\n不同评分的情感分布：")
print(rating_sentiment)

# 存储结果以便显示
df_names = ['df', 'rating_sentiment']
</textarea>
