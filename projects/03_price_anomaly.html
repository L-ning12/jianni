# 使用IQR方法检测商品价格异常值

import pandas as pd
import numpy as np

# 按类别分组检测异常值
def detect_anomalies_iqr(df, column):
    Q1 = df[column].quantile(0.25)
    Q3 = df[column].quantile(0.75)
    IQR = Q3 - Q1
    lower_bound = Q1 - 1.5 * IQR
    upper_bound = Q3 + 1.5 * IQR
    
    # 标记异常值
    df['is_anomaly'] = (df[column] < lower_bound) | (df[column] > upper_bound)
    df['lower_bound'] = lower_bound
    df['upper_bound'] = upper_bound
    
    return df

# 对每个类别进行异常检测
anomaly_results = []
for category in df['category'].unique():
    category_df = df[df['category'] == category].copy()
    category_df = detect_anomalies_iqr(category_df, 'price')
    anomaly_results.append(category_df)

# 合并结果
result = pd.concat(anomaly_results)

# 提取异常值
anomalies = result[result['is_anomaly'] == True]

# 显示结果
print("检测到的价格异常值：")
print(anomalies)

# 存储结果以便显示
df_names = ['result', 'anomalies']
</textarea>
