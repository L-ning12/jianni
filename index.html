<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandas 数据分析实战训练营 | 升级版</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif;}
        body{background:#f5f7fa;color:#333;line-height:1.6;padding:20px;}
        .container{max-width:1200px;margin:0 auto;}
        header{text-align:center;padding:30px 0;background:linear-gradient(135deg,#2c3e50,#3498db);color:#fff;border-radius:12px;margin-bottom:30px;box-shadow:0 4px 12px #0002;}
        header h1{font-size:2.2rem;margin-bottom:10px;}
        .progress-box{background:#fff;padding:15px;border-radius:10px;margin-bottom:25px;box-shadow:0 2px 8px #0001;}
        .progress-text{font-size:18px;font-weight:bold;color:#2c3e50;}
        .progress-bar{height:10px;background:#eee;border-radius:5px;margin-top:10px;overflow:hidden;}
        .progress-inner{height:100%;background:#27ae60;width:0%;transition:0.5s;}
        .intro-card{background:#fff;padding:20px;border-radius:10px;margin-bottom:30px;box-shadow:0 2px 8px #0001;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;}
        .intro-item{padding:10px;border-left:4px solid #3498db;}
        .level-tag{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;color:#fff;margin-right:8px;}
        .level-rud{background:#3498db;}
        .level-basic{background:#27ae60;}
        .level-adv{background:#f39c12;}
        .level-exp{background:#e74c3c;}
        .project-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:20px;}
        .project-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 3px 10px #0001;transition:0.3s;cursor:pointer;}
        .project-card:hover{transform:translateY(-5px);box-shadow:0 8px 20px #0002;}
        .project-desc{color:#666;margin:10px 0;font-size:14px;}
        .btn-start{display:inline-block;padding:8px 16px;background:#3498db;color:#fff;border-radius:6px;text-decoration:none;margin-top:10px;}
        .badge{float:right;width:30px;height:30px;border-radius:50%;background:#ddd;display:flex;align-items:center;justify-content:center;color:#999;}
        .badge.done{background:#f1c40f;color:#fff;}
        .code-box{margin-top:30px;background:#1e1e1e;border-radius:10px;padding:20px;color:#fff;}
        textarea{width:100%;height:200px;background:#2d2d2d;color:#ccc;border:none;padding:15px;border-radius:6px;resize:none;font-size:14px;}
        .run-btn{margin-top:10px;padding:8px 20px;background:#27ae60;border:none;color:#fff;border-radius:6px;cursor:pointer;}
        .output{margin-top:15px;padding:15px;background:#2d2d2d;border-radius:6px;min-height:80px;color:#ccc;}
        .hide{display:none;}
        .project-content{background:#fff;padding:25px;border-radius:12px;margin-top:20px;box-shadow:0 2px 10px #0001;}
        .step{margin:15px 0;padding-left:10px;border-left:3px solid #3498db;}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Pandas 数据分析实战训练营</h1>
            <p>10个精选实战项目 · 浏览器在线编程 · 自动保存学习进度</p>
        </header>

        <div class="progress-box">
            <div class="progress-text">已完成 <span id="doneNum">0</span> / 10 项目</div>
            <div class="progress-bar">
                <div class="progress-inner" id="progressBar"></div>
            </div>
        </div>

        <div class="intro-card">
            <div class="intro-item">✅ 无需安装Python，浏览器直接运行</div>
            <div class="intro-item">✅ 每个项目自带模拟数据集+参考代码</div>
            <div class="intro-item">✅ 自动记录学习进度，刷新不丢失</div>
            <div class="intro-item">✅ 从入门到专家，循序渐进练Pandas</div>
        </div>

        <div class="project-list" id="projectList">
        </div>

        <div id="projectDetail" class="hide">
            <div class="project-content">
                <h2 id="projTitle"></h2>
                <div id="projSteps"></div>
                <div class="code-box">
                    <h3>在线编写 Pandas 代码</h3>
                    <textarea id="codeEditor"></textarea>
                    <button class="run-btn" onclick="runCode()">运行代码</button>
                    <div class="output" id="codeOutput">运行结果会显示在这里...</div>
                </div>
                <button class="run-btn" style="background:#3498db;margin-top:20px;" onclick="backToList()">返回项目列表</button>
                <button class="run-btn" style="background:#f39c12;margin-top:20px;margin-left:10px;" onclick="markDone()">标记为已完成</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script>
        let pyodideReady = false;
        
        async function initPyodide() {
            try {
                self.pyodide = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.0/full/"
                });
                await self.pyodide.loadPackage(["pandas", "numpy"]);
                pyodideReady = true;
                console.log("Pyodide 初始化完成");
            } catch(e) {
                console.error("Pyodide 初始化失败:", e);
            }
        }
        
        initPyodide();
        
        const projects = [
            {
                name:"购物车放弃分析",
                level:"入门",
                levelClass:"level-rud",
                desc:"分析用户加购未付款行为，计算放弃率、时段趋势、核心原因指标",
                steps:`
                <div class="step">1. 导入 pandas 库</div>
                <div class="step">2. 读取模拟购物车数据</div>
                <div class="step">3. 查看数据基本信息、缺失值</div>
                <div class="step">4. 统计加购总数、未支付数量</div>
                <div class="step">5. 计算购物车放弃率</div>
                <div class="step">6. 简单业务结论总结</div>
                `,
                code:`import pandas as pd
data = {
    "user_id":[1,2,3,4,5,6],
    "cart_time":["08:20","09:10","10:30","14:20","19:50","20:10"],
    "is_pay":[1,0,1,0,0,1]
}
df = pd.DataFrame(data)
print("数据形状：",df.shape)
print("\\n前5行数据：")
print(df.head())
total = len(df)
not_pay = df[df["is_pay"]==0].shape[0]
rate = not_pay / total
print(f"\\n购物车放弃率：{rate:.2%}")`
            },
            {
                name:"RFM用户分层",
                level:"基础",
                levelClass:"level-basic",
                desc:"基于消费金额、频率、最近购买时间做用户价值分层",
                steps:`
                <div class="step">1. 导入 pandas</div>
                <div class="step">2. 构造用户消费数据</div>
                <div class="step">3. 计算 R/F/M 三个指标</div>
                <div class="step">4. 分值分箱打分</div>
                <div class="step">5. 用户价值分层归类</div>
                `,
                code:`import pandas as pd
from datetime import datetime
data = {
    "user_id":[101,102,103,104],
    "order_date":["2025-05-01","2025-04-20","2025-03-15","2025-05-05"],
    "order_count":[5,2,1,8],
    "amount":[580,230,99,1200]
}
df = pd.DataFrame(data)
print(df)`
            },
            {
                name:"价格异常检测",
                level:"基础",
                levelClass:"level-basic",
                desc:"使用IQR、标准差检测商品价格异常，适合风控定价",
                steps:`<div class="step">1.导入库</div><div class="step">2.商品价格数据</div><div class="step">3.四分位数IQR计算</div><div class="step">4.筛选异常高价/低价</div>`,
                code:`import pandas as pd
import numpy as np
price = [29,30,32,28,31,999,27,33,29,1200]
df = pd.DataFrame({"price":price})
Q1 = df["price"].quantile(0.25)
Q3 = df["price"].quantile(0.75)
IQR = Q3 - Q1
low = Q1 - 1.5*IQR
high = Q3 + 1.5*IQR
err = df[(df.price<low)|(df.price>high)]
print("异常价格：\\n",err)`
            },
            {name:"KMeans用户聚类",level:"进阶",levelClass:"level-adv",desc:"无监督学习自动分群，提取用户特征精准运营",steps:"<div class='step'>适合练习Pandas数据预处理+数值归一化</div>",code:`import pandas as pd`},
            {name:"购物篮商品关联分析",level:"进阶",levelClass:"level-adv",desc:"挖掘买A必买B搭配规律",steps:"<div class='step'>练习分组、统计、组合计数</div>",code:`import pandas as pd`},
            {name:"用户行为序列特征",level:"进阶",levelClass:"level-adv",desc:"分析点击/加购/支付转化路径",steps:"<div class='step'>时间排序、行为分组统计</div>",code:`import pandas as pd`},
            {name:"促销活动效果对比",level:"进阶",levelClass:"level-adv",desc:"对比活动与非活动周销量、转化率",steps:"<div class='step'>分组聚合、均值对比</div>",code:`import pandas as pd`},
            {name:"评论情感分析",level:"专家",levelClass:"level-exp",desc:"基于评分做用户满意度分析",steps:"<div class='step'>文本分类、分组统计好评率</div>",code:`import pandas as pd`},
            {name:"用户LTV生命周期价值",level:"专家",levelClass:"level-exp",desc:"计算用户长期商业价值",steps:"<div class='step'>累计求和、分组用户价值</div>",code:`import pandas as pd`},
            {name:"实时特征滚动窗口模拟",level:"专家",levelClass:"level-exp",desc:"时间窗口滚动统计特征工程",steps:"<div class='step'>滚动窗口、shift偏移计算</div>",code:`import pandas as pd`}
        ];

        let doneList = JSON.parse(localStorage.getItem("pandasDone")) || [];

        function renderProjects(){
            const wrap = document.getElementById("projectList");
            wrap.innerHTML = "";
            projects.forEach((item,idx)=>{
                const isDone = doneList.includes(idx);
                wrap.innerHTML += `
                <div class="project-card" onclick="openProject(${idx})">
                    <span class="level-tag ${item.levelClass}">${item.level}</span>
                    <span class="badge ${isDone?'done':''}">${isDone?'✓':''}</span>
                    <h3>${item.name}</h3>
                    <p class="project-desc">${item.desc}</p>
                    <a class="btn-start">开始学习</a>
                </div>
                `;
            });
            updateProgress();
        }

        function updateProgress(){
            const done = doneList.length;
            document.getElementById("doneNum").innerText = done;
            const per = (done/10)*100;
            document.getElementById("progressBar").style.width = per+"%";
        }

        let nowIdx = 0;
        function openProject(idx){
            nowIdx = idx;
            const item = projects[idx];
            document.getElementById("projTitle").innerText = item.name;
            document.getElementById("projSteps").innerHTML = item.steps;
            document.getElementById("codeEditor").value = item.code;
            document.getElementById("codeOutput").innerText = "运行结果会显示在这里...";
            document.getElementById("projectList").classList.add("hide");
            document.getElementById("projectDetail").classList.remove("hide");
        }

        function backToList(){
            document.getElementById("projectDetail").classList.add("hide");
            document.getElementById("projectList").classList.remove("hide");
        }

        function markDone(){
            if(!doneList.includes(nowIdx)){
                doneList.push(nowIdx);
                localStorage.setItem("pandasDone",JSON.stringify(doneList));
                renderProjects();
                alert("已标记为完成，进度自动保存！");
            }else{
                alert("该项目已经完成啦");
            }
        }

        async function runCode(){
            const code = document.getElementById("codeEditor").value;
            const out = document.getElementById("codeOutput");
            
            if (!pyodideReady) {
                out.innerText = "Python环境正在初始化中，请稍候...";
                return;
            }
            
            out.innerText = "正在运行...";
            try {
                await self.pyodide.runPythonAsync(code);
                const stdout = self.pyodide.runPython("import sys; sys.stdout.getvalue()");
                out.innerText = stdout || "代码执行完成，无返回文本";
            }catch(e){
                out.innerText = "报错："+e.toString();
            }
        }

        window.onload = function(){
            renderProjects();
        }
    </script>
</body>
</html>
