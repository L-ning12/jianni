<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时特征模拟</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/python/python.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/monokai.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
    <script src="../common/pyodide_setup.js"></script>
    <script src="../common/code_runner.js"></script>
    <script src="../common/storage.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                    },
                },
            }
        }
    </script>
    <style>
        .CodeMirror {
            height: 300px;
            border-radius: 0.375rem;
        }
        .output-area {
            min-height: 100px;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-8">
            <a href="../index.html" class="text-primary hover:underline mb-4 inline-block">
                <i class="fa fa-arrow-left mr-2"></i>返回首页
            </a>
            <h1 class="text-3xl font-bold text-gray-800">实时特征模拟</h1>
            <p class="text-gray-600 mt-2">模拟实时数据流，计算1小时滚动窗口特征</p>
        </header>

        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">数据预览</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">user_id</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">timestamp</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">amount</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="data-preview">
                        <!-- 数据将通过JavaScript动态填充 -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">代码编辑器</h2>
                <div>
                    <button id="run-btn" class="bg-primary text-white px-4 py-2 rounded-md hover:bg-blue-600 mr-2">
                        <i class="fa fa-play mr-1"></i>运行
                    </button>
                    <button id="answer-btn" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-300">
                        <i class="fa fa-lightbulb-o mr-1"></i>参考答案
                    </button>
                </div>
            </div>
            <textarea id="code-editor"># 实时特征模拟
# 计算1小时滚动窗口特征

import pandas as pd
import numpy as np

# 转换时间戳格式
df['timestamp'] = pd.to_datetime(df['timestamp'])

# 按用户分组计算滚动窗口特征
user_features = []

for user_id, user_data in df.groupby('user_id'):
    # 按时间排序
    user_data = user_data.sort_values('timestamp')
    
    # 设置时间索引
    user_data = user_data.set_index('timestamp')
    
    # 计算1小时滚动窗口特征
    user_data['rolling_sum_1h'] = user_data['amount'].rolling('1h').sum()
    user_data['rolling_count_1h'] = user_data['amount'].rolling('1h').count()
    user_data['rolling_avg_1h'] = user_data['amount'].rolling('1h').mean()
    
    # 重置索引
    user_data = user_data.reset_index()
    user_data['user_id'] = user_id
    
    user_features.append(user_data)

# 合并结果
result = pd.concat(user_features)

# 显示结果
print("实时特征计算结果：")
print(result)

# 存储结果以便显示
df_names = ['result']
</textarea>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">输出结果</h2>
            <div class="bg-gray-50 p-4 rounded-md output-area" id="output"></div>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4">数据表格</h2>
            <div id="table-output"></div>
        </div>
    </div>

    <script>
        // 示例CSV数据
        const csvData = `user_id,timestamp,amount
1,2023-10-01 00:00:00,100
1,2023-10-01 00:15:00,150
1,2023-10-01 00:30:00,200
1,2023-10-01 01:00:00,120
1,2023-10-01 01:30:00,180
2,2023-10-01 00:00:00,80
2,2023-10-01 00:45:00,160
2,2023-10-01 01:15:00,140
3,2023-10-01 00:30:00,200
3,2023-10-01 01:00:00,150
3,2023-10-01 01:30:00,100
4,2023-10-01 00:15:00,110
4,2023-10-01 00:45:00,190
4,2023-10-01 01:00:00,170
5,2023-10-01 00:00:00,120
5,2023-10-01 00:30:00,180
5,2023-10-01 01:00:00,140
5,2023-10-01 01:45:00,160`;

        // 初始化CodeMirror编辑器
        const editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
            mode: 'python',
            theme: 'monokai',
            lineNumbers: true,
            indentUnit: 4,
            tabSize: 4,
            autofocus: false
        });

        // 加载保存的代码
        const projectId = '10_realtime_features';
        const savedCode = loadCode(projectId);
        if (savedCode) {
            editor.setValue(savedCode);
        }

        // 填充数据预览
        function populateDataPreview() {
            const rows = csvData.split('\n');
            const headers = rows[0].split(',');
            const tbody = document.getElementById('data-preview');
            
            // 显示前5行数据
            for (let i = 1; i < Math.min(rows.length, 6); i++) {
                const rowData = rows[i].split(',');
                const tr = document.createElement('tr');
                
                for (const value of rowData) {
                    const td = document.createElement('td');
                    td.className = 'px-6 py-4 whitespace-nowrap text-sm text-gray-500';
                    td.textContent = value;
                    tr.appendChild(td);
                }
                
                tbody.appendChild(tr);
            }
        }

        // 运行按钮点击事件
        document.getElementById('run-btn').addEventListener('click', async () => {
            const code = editor.getValue();
            const outputElement = document.getElementById('output');
            const tableElement = document.getElementById('table-output');
            
            // 保存代码
            saveCode(projectId, code);
            
            // 准备代码（添加数据加载）
            const fullCode = prepareCodeWithData(code, csvData);
            
            // 运行代码
            outputElement.textContent = '运行中...';
            await runCode(fullCode, outputElement, tableElement);
        });

        // 参考答案按钮点击事件
        document.getElementById('answer-btn').addEventListener('click', () => {
            const answerCode = `# 实时特征模拟
# 计算1小时滚动窗口特征

import pandas as pd
import numpy as np

# 转换时间戳格式
df['timestamp'] = pd.to_datetime(df['timestamp'])

# 按用户分组计算滚动窗口特征
user_features = []

for user_id, user_data in df.groupby('user_id'):
    # 按时间排序
    user_data = user_data.sort_values('timestamp')
    
    # 设置时间索引
    user_data = user_data.set_index('timestamp')
    
    # 计算1小时滚动窗口特征
    user_data['rolling_sum_1h'] = user_data['amount'].rolling('1h').sum()
    user_data['rolling_count_1h'] = user_data['amount'].rolling('1h').count()
    user_data['rolling_avg_1h'] = user_data['amount'].rolling('1h').mean()
    
    # 重置索引
    user_data = user_data.reset_index()
    user_data['user_id'] = user_id
    
    user_features.append(user_data)

# 合并结果
result = pd.concat(user_features)

# 显示结果
print("实时特征计算结果：")
print(result)

# 存储结果以便显示
df_names = ['result']
`;
            editor.setValue(answerCode);
            saveCode(projectId, answerCode);
        });

        // 初始化
        async function init() {
            // 初始化Pyodide
            await initializePyodide();
            // 填充数据预览
            populateDataPreview();
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
