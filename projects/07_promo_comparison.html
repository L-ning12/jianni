<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>促销活动对比</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/python/python.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/monokai.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>
    <script src="../common/pyodide_setup.js"></script>
    <script src="../common/code_runner.js"></script>
    <script src="../common/storage.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                    },
                },
            }
        }
    </script>
    <style>
        .CodeMirror {
            height: 300px;
            border-radius: 0.375rem;
        }
        .output-area {
            min-height: 100px;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-8">
            <a href="../index.html" class="text-primary hover:underline mb-4 inline-block">
                <i class="fa fa-arrow-left mr-2"></i>返回首页
            </a>
            <h1 class="text-3xl font-bold text-gray-800">促销活动对比</h1>
            <p class="text-gray-600 mt-2">对比促销活动与非促销活动的销售情况</p>
        </header>

        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">数据预览</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">user_id</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">date</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">is_promo</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">amount</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="data-preview">
                        <!-- 数据将通过JavaScript动态填充 -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">代码编辑器</h2>
                <div>
                    <button id="run-btn" class="bg-primary text-white px-4 py-2 rounded-md hover:bg-blue-600 mr-2">
                        <i class="fa fa-play mr-1"></i>运行
                    </button>
                    <button id="answer-btn" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-md hover:bg-gray-300">
                        <i class="fa fa-lightbulb-o mr-1"></i>参考答案
                    </button>
                </div>
            </div>
            <textarea id="code-editor"># 促销活动对比分析
# 对比促销活动与非促销活动的销售情况

import pandas as pd

# 转换日期格式
df['date'] = pd.to_datetime(df['date'])

# 按促销活动状态分组分析
promo_analysis = df.groupby('is_promo').agg({
    'amount': ['mean', 'sum', 'count'],
    'user_id': 'nunique'
}).reset_index()

# 重命名列
promo_analysis.columns = ['is_promo', 'avg_amount', 'total_amount', 'order_count', 'unique_users']

# 计算转化率（订单数/用户数）
promo_analysis['conversion_rate'] = promo_analysis['order_count'] / promo_analysis['unique_users']

# 按周分组分析促销效果
df['week'] = df['date'].dt.isocalendar().week
df['year'] = df['date'].dt.isocalendar().year

weekly_analysis = df.groupby(['year', 'week', 'is_promo']).agg({
    'amount': 'sum',
    'order_count': 'count',
    'unique_users': 'nunique'
}).reset_index()

# 显示结果
print("促销活动与非促销活动对比：")
print(promo_analysis)

print("\n每周促销效果：")
print(weekly_analysis)

# 存储结果以便显示
df_names = ['promo_analysis', 'weekly_analysis']
</textarea>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">输出结果</h2>
            <div class="bg-gray-50 p-4 rounded-md output-area" id="output"></div>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4">数据表格</h2>
            <div id="table-output"></div>
        </div>
    </div>

    <script>
        // 示例CSV数据
        const csvData = `user_id,date,is_promo,amount
1,2023-10-01,0,100
1,2023-10-05,1,150
1,2023-10-10,0,80
2,2023-10-02,0,120
2,2023-10-06,1,180
3,2023-10-03,1,200
3,2023-10-09,0,100
4,2023-10-01,0,80
4,2023-10-07,1,160
5,2023-10-02,1,140
5,2023-10-08,0,90
6,2023-10-03,0,110
6,2023-10-10,1,190
7,2023-10-04,1,170
7,2023-10-09,0,100
8,2023-10-01,0,90
8,2023-10-06,1,150
9,2023-10-02,1,160
9,2023-10-07,0,110
10,2023-10-03,0,120
10,2023-10-08,1,180
11,2023-10-04,0,100
11,2023-10-10,1,170
12,2023-10-01,1,150
12,2023-10-05,0,90
13,2023-10-02,0,110
13,2023-10-06,1,160
14,2023-10-03,1,180
14,2023-10-09,0,120
15,2023-10-04,0,100
15,2023-10-08,1,170`;

        // 初始化CodeMirror编辑器
        const editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
            mode: 'python',
            theme: 'monokai',
            lineNumbers: true,
            indentUnit: 4,
            tabSize: 4,
            autofocus: false
        });

        // 加载保存的代码
        const projectId = '07_promo_comparison';
        const savedCode = loadCode(projectId);
        if (savedCode) {
            editor.setValue(savedCode);
        }

        // 填充数据预览
        function populateDataPreview() {
            const rows = csvData.split('\n');
            const headers = rows[0].split(',');
            const tbody = document.getElementById('data-preview');
            
            // 显示前5行数据
            for (let i = 1; i < Math.min(rows.length, 6); i++) {
                const rowData = rows[i].split(',');
                const tr = document.createElement('tr');
                
                for (const value of rowData) {
                    const td = document.createElement('td');
                    td.className = 'px-6 py-4 whitespace-nowrap text-sm text-gray-500';
                    td.textContent = value;
                    tr.appendChild(td);
                }
                
                tbody.appendChild(tr);
            }
        }

        // 运行按钮点击事件
        document.getElementById('run-btn').addEventListener('click', async () => {
            const code = editor.getValue();
            const outputElement = document.getElementById('output');
            const tableElement = document.getElementById('table-output');
            
            // 保存代码
            saveCode(projectId, code);
            
            // 准备代码（添加数据加载）
            const fullCode = prepareCodeWithData(code, csvData);
            
            // 运行代码
            outputElement.textContent = '运行中...';
            await runCode(fullCode, outputElement, tableElement);
        });

        // 参考答案按钮点击事件
        document.getElementById('answer-btn').addEventListener('click', () => {
            const answerCode = `# 促销活动对比分析
# 对比促销活动与非促销活动的销售情况

import pandas as pd

# 转换日期格式

# 按促销活动状态分组分析
promo_analysis = df.groupby('is_promo').agg({
    'amount': ['mean', 'sum', 'count'],
    'user_id': 'nunique'
}).reset_index()

# 重命名列
promo_analysis.columns = ['is_promo', 'avg_amount', 'total_amount', 'order_count', 'unique_users']

# 计算转化率（订单数/用户数）
promo_analysis['conversion_rate'] = promo_analysis['order_count'] / promo_analysis['unique_users']

# 按周分组分析促销效果
df['week'] = df['date'].dt.isocalendar().week
df['year'] = df['date'].dt.isocalendar().year

weekly_analysis = df.groupby(['year', 'week', 'is_promo']).agg({
    'amount': 'sum',
    'order_count': 'count',
    'unique_users': 'nunique'
}).reset_index()

# 显示结果
print("促销活动与非促销活动对比：")
print(promo_analysis)

print("\n每周促销效果：")
print(weekly_analysis)

# 存储结果以便显示
df_names = ['promo_analysis', 'weekly_analysis']
`;
            editor.setValue(answerCode);
            saveCode(projectId, answerCode);
        });

        // 初始化
        async function init() {
            // 初始化Pyodide
            await initializePyodide();
            // 填充数据预览
            populateDataPreview();
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
