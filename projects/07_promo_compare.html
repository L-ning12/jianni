        const answerCode = `import pandas as pd
import io

csv_data = """date,orders,revenue,avg_order_value,conversion_rate,promo_flag
2024-01-01,150,22500,150,3.2,0
2024-01-02,165,24750,150,3.5,0

2024-01-11,330,49500,150,6.9,1

2024-01-13,250,37500,150,5.2,1
2024-01-14,220,33000,150,4.6,1
2024-01-15,185,27750,150,3.9,0
2024-01-16,175,26250,150,3.7,0
2024-01-17,168,25200,150,3.5,0
2024-01-18,172,25800,150,3.6,0
2024-01-19,165,24750,150,3.5,0
2024-01-20,158,23700,150,3.3,0
2024-01-21,175,26250,150,3.7,0
2024-01-22,180,27000,150,3.8,0
2024-01-23,290,43500,150,6.1,1
2024-01-24,330,49500,150,6.9,1
2024-01-25,360,54000,150,7.5,1
2024-01-26,340,51000,150,7.1,1
2024-01-27,310,46500,150,6.5,1
2024-01-28,260,39000,150,5.4,1
2024-01-29,230,34500,150,4.8,1
2024-01-30,190,28500,150,4.0,0
2024-01-31,180,27000,150,3.8,0"""

df = pd.read_csv(io.StringIO(csv_data))
df['date'] = pd.to_datetime(df['date'])

print("=" * 50)
print("促销活动效果对比分析报告")
print("=" * 50)

# 1. 分组对比统计
print("\\n1. 促销期 vs 非促销期指标对比:")
promo_group = df.groupby('promo_flag').agg({
    'orders': ['mean', 'sum'],
    'revenue': ['mean', 'sum'],
    'conversion_rate': 'mean'
}).round(1)

# 重命名列
promo_group.columns = ['订单量_均值', '订单量_总和', '营收_均值', '营收_总和', '转化率_均值']
print(promo_group)

# 2. 计算促销带来的增量
print("\\n2. 促销增量分析:")
non_promo_avg = df[df['promo_flag'] == 0][['orders', 'revenue']].mean()
promo_days = df[df['promo_flag'] == 1].shape[0]

incremental_orders = (df[df['promo_flag'] == 1]['orders'] - non_promo_avg['orders']).sum()
incremental_revenue = (df[df['promo_flag'] == 1]['revenue'] - non_promo_avg['revenue']).sum()

print(f"   非促销期日均订单: {non_promo_avg['orders']:.0f}")
print(f"   非促销期日均营收: {non_promo_avg['revenue']:.0f}")
print(f"   促销天数: {promo_days}天")
print(f"   促销带来的增量订单: {incremental_orders:.0f}")
print(f"   促销带来的增量营收: {incremental_revenue:.0f}")

# 3. 按日期分组的趋势分析
print("\\n3. 促销期间日趋势:")
promo_df = df[df['promo_flag'] == 1].copy()
promo_df = promo_df.sort_values('date')

# 计算相对增长
first_day = promo_df.iloc[0]
promo_df['orders_growth_pct'] = ((promo_df['orders'] - first_day['orders']) / first_day['orders'] * 100).round(1)

print("日期\\t\\t订单量\\t转化率%\\t较首日增长%")
print("-" * 60)
for _, row in promo_df.iterrows():
    print(f"{row['date'].date()}\\t{row['orders']}\\t\\t{row['conversion_rate']}\\t\\t{row['orders_growth_pct']}")

# 4. 促销活动效果汇总
print("\\n4. 活动效果汇总:")
total_promo_revenue = df[df['promo_flag'] == 1]['revenue'].sum()
total_non_promo_revenue = df[df['promo_flag'] == 0]['revenue'].sum()
promo_revenue_ratio = (total_promo_revenue / (total_promo_revenue + total_non_promo_revenue) * 100).round(1)

print(f"   促销期总营收: {total_promo_revenue}")
print(f"   非促销期总营收: {total_non_promo_revenue}")
print(f"   促销期营收占比: {promo_revenue_ratio}%")

# 5. 转化率提升分析
avg_promo_conv = df[df['promo_flag'] == 1]['conversion_rate'].mean()
avg_non_promo_conv = df[df['promo_flag'] == 0]['conversion_rate'].mean()
conv_lift = ((avg_promo_conv - avg_non_promo_conv) / avg_non_promo_conv * 100).round(1)

print(f"\\n5. 转化率提升分析:")
print(f"   非促销期平均转化率: {avg_non_promo_conv:.1f}%")
print(f"   促销期平均转化率: {avg_promo_conv:.1f}%")
print(f"   转化率提升: {conv_lift:.1f}%")

print("\\n" + "=" * 50)
print("分析完成!")
print("=" * 50)
`;

        const parseCSV = (csv) => {
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',');
            const rows = lines.slice(1, 21).map(line => {
                const values = line.split(',');
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = values[index];
                });
                return obj;
            });
            return { headers, rows };
        };
        
        const { headers, rows } = parseCSV(csvData);

            setup() {
                const code = ref(loadCode(projectId) || defaultCode);
                const output = ref([]);
                const isRunning = ref(false);
                const isCompletedStatus = ref(isCompleted(projectId));
                const showAnswer = ref(false);
                let editor = null;
                
                const addOutput = (type, content) => {
                    output.value.push({
                        type,
                        content,
                        id: Date.now()
                    });
                };
                
                const handleRun = async () => {
                    isRunning.value = true;
                    output.value = [];
                    addOutput('info', '正在运行代码...');
                    
                    try {
                        await runCode(code.value, (result) => {
                            if (result.type === 'text') {
                                addOutput('text', result.content);
                            } else if (result.type === 'table') {
                                addOutput('table', result.content);
                            } else if (result.type === 'error') {
                                addOutput('error', result.content);
                            }
                        });
                    } catch (error) {
                        addOutput('error', String(error));
                    } finally {
                        isRunning.value = false;
                    }
                };
                
                const handleReset = () => {
                    code.value = defaultCode;
                    if (editor) {
                        editor.setValue(defaultCode);
                    }
                    saveCode(projectId, defaultCode);
                };

                    showAnswer.value = !showAnswer.value;
                    if (showAnswer.value) {

                        }
                    } else {
                        code.value = loadCode(projectId) || defaultCode;

                        }
                    }

                const handleComplete = () => {
                    markCompleted(projectId);

                    saveCode(projectId, newCode);

                                autoCloseBrackets: true,

                            editor.on('change', () => {

                            });
