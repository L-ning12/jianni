print("=" * 50)

print("\\n1. 基础统计:")

print(f"   平均评分: {df['rating'].mean():.2f}")
print(f"   产品数: {df['product_id'].nunique()}")

# 2. 评分分布
print("\\n2. 评分分布:")
rating_dist = df['rating'].value_counts().sort_index()
for rating, count in rating_dist.items():
    percentage = (count / len(df) * 100).round(1)
    print(f"   {rating}星: {count}条 ({percentage}%)")

# 3. 情感关键词分析
print("\\n3. 情感关键词分析:")

# 正面和负面关键词库
positive_words = ['好', '棒', '优秀', '满意', '推荐', '喜欢', '赞', '棒', '快', '不错', '精', '实', '超值', '耐心', '满意', '物美', '价廉', '超出', '预期', '简单', '精美', '很好', '很快', '很高']
negative_words = ['差', '慢', '坏', '失望', '一般', '复杂', '贵', '不满意', '不值', '容易坏', '差异', '慢', '不够好', '不推荐', '不太好', '一般般', '太']

def analyze_sentiment(text):
    text = str(text)
    positive_count = sum(1 for word in positive_words if word in text)
    negative_count = sum(1 for word in negative_words if word in text)
    
    if positive_count > negative_count:
        return '正面'
    elif negative_count > positive_count:
        return '负面'
    else:
        return '中性'

df['sentiment'] = df['review_text'].apply(analyze_sentiment)

print("\\n   情感分布:")
sentiment_dist = df['sentiment'].value_counts()
for sentiment, count in sentiment_dist.items():
    percentage = (count / len(df) * 100).round(1)
    print(f"   {sentiment}: {count}条 ({percentage}%)")

# 4. 高频关键词统计
print("\\n4. 高频正面关键词:")
all_text = ' '.join(df['review_text'].astype(str))
positive_found = [word for word in positive_words if word in all_text]
positive_counts = Counter()
for word in positive_found:
    positive_counts[word] = all_text.count(word)

for word, count in positive_counts.most_common(10):
    print(f"   {word}: {count}次")

print("\\n   高频负面关键词:")
negative_found = [word for word in negative_words if word in all_text]
negative_counts = Counter()
for word in negative_found:
    negative_counts[word] = all_text.count(word)

for word, count in negative_counts.most_common(10):
    print(f"   {word}: {count}次")

# 5. 产品维度分析
print("\\n5. 产品维度分析:")
product_analysis = df.groupby('product_id').agg({
    'rating': ['mean', 'count'],
    'review_id': 'count'
}).round(2)

product_analysis.columns = ['平均评分', '评论数', '总评论']
print(product_analysis)

# 各产品情感分布
print("\\n   各产品情感分布:")
product_sentiment = pd.crosstab(df['product_id'], df['sentiment'])
print(product_sentiment)

print("\\n" + "=" * 50)
print("分析完成!")
print("=" * 50)

        const parseCSV = (csv) => {
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',');
            const rows = lines.slice(1, 21).map(line => {
                const values = line.split(',');
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = values[index];
                });
                return obj;
            });
            return { headers, rows };
        };
        
        const { headers, rows } = parseCSV(csvData);

            setup() {
                const code = ref(loadCode(projectId) || defaultCode);
                const output = ref([]);
                const isRunning = ref(false);
                const isCompletedStatus = ref(isCompleted(projectId));
                const showAnswer = ref(false);
                let editor = null;
                
                const addOutput = (type, content) => {
                    output.value.push({
                        type,
                        content,
                        id: Date.now()
                    });
                };
                
                const handleRun = async () => {
                    isRunning.value = true;
                    output.value = [];
                    addOutput('info', '正在运行代码...');
                    
                    try {
                        await runCode(code.value, (result) => {
                            if (result.type === 'text') {
                                addOutput('text', result.content);
                            } else if (result.type === 'table') {
                                addOutput('table', result.content);
                            } else if (result.type === 'error') {
                                addOutput('error', result.content);
                            }
                        });
                    } catch (error) {
                        addOutput('error', String(error));
                    } finally {
                        isRunning.value = false;
                    }
                };
                
                const handleReset = () => {
                    code.value = defaultCode;
                    if (editor) {
                        editor.setValue(defaultCode);
                    }

                        }
                    }

                                autoCloseBrackets: true,

                            });
                            
                            editor.setValue(code.value);
                            
                            editor.on('change', () => {
                                handleCodeChange(editor.getValue());
                            });
                        }
                    }

                                    <div v-else-if="item.type === 'text'" class="text-slate-300 text-sm whitespace-pre-wrap font-mono">{{ item.content }}</div>
                                    <div v-else-if="item.type === 'table'" v-html="item.content" class="overflow-x-auto"></div>
                                    <div v-else-if="item.type === 'error'" class="text-red-400 text-sm whitespace-pre-wrap font-mono">{{ item.content }}</div>
                                </div>
                            </div>
                        </section>
                        
                        <!-- Complete Button -->
                        <section class="text-center">
                            <button v-if="!isCompletedStatus" @click="handleComplete" class="px-8 py-3 bg-green-600 hover:bg-green-500 text-white rounded-xl font-semibold flex items-center gap-2 mx-auto transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                </svg>
                                标记完成
                            </button>
                            <div v-else class="px-8 py-3 bg-green-900/30 border border-green-700/50 text-green-400 rounded-xl font-semibold flex items-center gap-2 mx-auto justify-center">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                </svg>
                                项目已完成
                            </div>
                        </section>
                    </main>
                </div>
            \`
        }).mount('#app');
    </script>
</body>
</html>
