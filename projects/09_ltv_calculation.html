        const answerCode = `import pandas as pd

csv_data = """user_id,order_id,order_date,order_amount,product_count,signup_date

15,1029,2024-04-08,89,1,2024-04-01"""

df = pd.read_csv(io.StringIO(csv_data))
df['order_date'] = pd.to_datetime(df['order_date'])
df['signup_date'] = pd.to_datetime(df['signup_date'])

print("=" * 50)
print("用户LTV生命周期价值分析报告")
print("=" * 50)

# 1. 计算每个用户的核心指标
print("\\n1. 用户核心指标统计:")
user_metrics = df.groupby('user_id').agg({
    'order_id': 'count',
    'order_amount': 'sum',
    'product_count': 'sum',
    'order_date': ['min', 'max'],
    'signup_date': 'first'
}).round(2)

user_metrics.columns = ['订单数', '总消费', '总商品数', '首购日期', '末购日期', '注册日期']
user_metrics = user_metrics.reset_index()

# 计算用户生命周期
user_metrics['生命周期天数'] = (user_metrics['末购日期'] - user_metrics['注册日期']).dt.days
user_metrics['客单价'] = (user_metrics['总消费'] / user_metrics['订单数']).round(2)
user_metrics['月均消费'] = (user_metrics['总消费'] / (user_metrics['生命周期天数'] / 30)).round(2)

# 计算30天LTV (首购后30天内的消费)
user_metrics['首购后30天'] = user_metrics['首购日期'] + pd.Timedelta(days=30)
print(f"   总用户数: {len(user_metrics)}")
print(f"   平均订单数: {user_metrics['订单数'].mean():.1f}")
print(f"   平均总消费: {user_metrics['总消费'].mean():.0f}")
print(f"   平均生命周期天数: {user_metrics['生命周期天数'].mean():.0f}")

# 2. 用户层级分析
print("\\n2. 用户消费层级分析:")
percentiles = user_metrics['总消费'].quantile([0.25, 0.5, 0.75])
print(f"   25%分位: {percentiles[0.25]:.0f}")
print(f"   50%分位: {percentiles[0.5]:.0f}")
print(f"   75%分位: {percentiles[0.75]:.0f}")

def get_tier(amount):
    if amount >= percentiles[0.75]:
        return '高价值'
    elif amount >= percentiles[0.5]:
        return '中价值'
    elif amount >= percentiles[0.25]:
        return '低价值'
    else:
        return '潜力用户'

user_metrics['用户层级'] = user_metrics['总消费'].apply(get_tier)
tier_analysis = user_metrics.groupby('用户层级').agg({
    'user_id': 'count',
    '总消费': ['sum', 'mean'],
    '订单数': 'mean',
    '生命周期天数': 'mean'
}).round(2)

tier_analysis.columns = ['用户数', '总消费合计', '平均消费', '平均订单数', '平均生命周期']
print(tier_analysis)

# 3. 30天LTV计算
print("\\n3. 30天LTV计算:")
# 合并回订单数据，判断是否在首购30天内
orders_with_ltv = df.merge(user_metrics[['user_id', '首购日期', '首购后30天']], on='user_id', how='left')
orders_with_ltv['在30天内'] = (orders_with_ltv['order_date'] <= orders_with_ltv['首购后30天'])

# 计算30天LTV
ltv_30 = orders_with_ltv[orders_with_ltv['在30天内']].groupby('user_id')['order_amount'].sum().reset_index()
ltv_30.columns = ['user_id', '30天LTV']

user_metrics = user_metrics.merge(ltv_30, on='user_id', how='left')
user_metrics['30天LTV'] = user_metrics['30天LTV'].fillna(0)

print(f"   平均30天LTV: {user_metrics['30天LTV'].mean():.0f}")
print(f"   30天LTV中位数: {user_metrics['30天LTV'].median():.0f}")
print(f"   30天LTV最高: {user_metrics['30天LTV'].max():.0f}")

# 4. 按层级的LTV分析
print("\\n4. 各用户层级的LTV分析:")
tier_ltv = user_metrics.groupby('用户层级').agg({
    '30天LTV': ['mean', 'sum'],
    '总消费': ['mean', 'sum'],
    'user_id': 'count'
}).round(2)

tier_ltv.columns = ['平均30天LTV', '30天LTV合计', '平均总消费', '总消费合计', '用户数']
print(tier_ltv)

# 5. 显示用户详情
print("\\n5. 用户LTV详情 (Top 5高价值用户):")
top_users = user_metrics.nlargest(5, '总消费')[['user_id', '用户层级', '总消费', '30天LTV', '订单数', '客单价', '生命周期天数']]
print(top_users.to_string(index=False))

print("\\n" + "=" * 50)
print("分析完成!")
print("=" * 50)
`;

        const parseCSV = (csv) => {
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',');
            const rows = lines.slice(1, 21).map(line => {
                const values = line.split(',');
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = values[index];
                });
                return obj;
            });
            return { headers, rows };
        };

                        content,
                        id: Date.now()

                    isRunning.value = true;
                    output.value = [];
                    addOutput('info', '正在运行代码...');
                    
                    try {
                        await runCode(code.value, (result) => {
                            if (result.type === 'text') {
                                addOutput('text', result.content);
                            } else if (result.type === 'table') {
                                addOutput('table', result.content);
                            } else if (result.type === 'error') {

                                    <div v-else-if="item.type === 'text'" class="text-slate-300 text-sm whitespace-pre-wrap font-mono">{{ item.content }}</div>
                                    <div v-else-if="item.type === 'table'" v-html="item.content" class="overflow-x-auto"></div>
                                    <div v-else-if="item.type === 'error'" class="text-red-400 text-sm whitespace-pre-wrap font-mono">{{ item.content }}</div>
                                </div>
                            </div>
                        </section>
                        
                        <!-- Complete Button -->
                        <section class="text-center">
                            <button v-if="!isCompletedStatus" @click="handleComplete" class="px-8 py-3 bg-green-600 hover:bg-green-500 text-white rounded-xl font-semibold flex items-center gap-2 mx-auto transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                </svg>
                                标记完成
                            </button>
                            <div v-else class="px-8 py-3 bg-green-900/30 border border-green-700/50 text-green-400 rounded-xl font-semibold flex items-center gap-2 mx-auto justify-center">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                </svg>
                                项目已完成
                            </div>
                        </section>
                    </main>
                </div>
            \`
        }).mount('#app');
    </script>
</body>
</html>
