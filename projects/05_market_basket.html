# 计算商品对支持度

import pandas as pd
from itertools import combinations

# 按订单分组，获取每个订单的商品列表
order_products = df.groupby('order_id')['product_name'].apply(list).reset_index()

# 计算商品对支持度
def calculate_support(order_products):
    # 计算总订单数
    total_orders = len(order_products)
    
    # 统计商品对出现的次数
    product_pairs = {}
    
    for products in order_products['product_name']:
        # 生成所有可能的商品对
        for pair in combinations(products, 2):
            # 确保商品对按字母顺序排列，避免重复
            sorted_pair = tuple(sorted(pair))
            if sorted_pair in product_pairs:
                product_pairs[sorted_pair] += 1
            else:
                product_pairs[sorted_pair] = 1
    
    # 计算支持度
    support_data = []
    for pair, count in product_pairs.items():
        support = count / total_orders
        support_data.append({
            'product1': pair[0],
            'product2': pair[1],
            'count': count,
            'support': support
        })
    
    # 转换为DataFrame并按支持度降序排序
    support_df = pd.DataFrame(support_data)
    support_df = support_df.sort_values('support', ascending=False)
    
    return support_df

# 计算商品对支持度
support_df = calculate_support(order_products)

# 显示结果
print("商品对支持度（前20个）：")
print(support_df.head(20))

# 存储结果以便显示
df_names = ['support_df']
</textarea>
