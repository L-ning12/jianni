import io

csv_data = """user_id,event_time,event_type,product_id,amount,payment_method
1,2024-01-01 08:00:00,view,101,0,

7,2024-01-01 14:00:00,purchase,701,299,wechat
8,2024-01-01 15:00:00,view,801,0,
8,2024-01-01 15:30:00,add_cart,801,0,

9,2024-01-01 16:10:00,purchase,901,1599,alipay
10,2024-01-01 17:00:00,view,1001,0,
1,2024-01-01 18:00:00,view,102,0,
1,2024-01-01 18:30:00,purchase,102,199,wechat
"""

df = pd.read_csv(io.StringIO(csv_data))
df['event_time'] = pd.to_datetime(df['event_time'])
df = df.sort_values('event_time').reset_index(drop=True)

print("=" * 50)
print("实时特征滚动窗口模拟分析报告")
print("=" * 50)

# 1. 按1小时滚动窗口计算活跃用户数
print("\\n1. 滚动窗口统计分析:")
df = df.set_index('event_time')

# 1小时滚动窗口统计
hourly_stats = df.rolling('1h').agg({
    'user_id': 'nunique',
    'product_id': 'count',
    'amount': 'sum'
})
hourly_stats.columns = ['活跃用户数', '事件数', '总金额']
print(hourly_stats.to_string())

# 2. 计算各用户最近的行为统计
print("\\n2. 用户实时特征:")
df = df.reset_index()

# 计算每个用户的累计行为
user_features = df.groupby('user_id').agg({
    'event_time': ['min', 'max', 'count'],
    'product_id': 'nunique',
    'amount': 'sum'
}).round(2)

user_features.columns = ['首次活跃时间', '末次活跃时间', '总行为数', '浏览商品数', '总消费金额']

# 计算用户最近1小时、6小时的行为
current_time = df['event_time'].max()

def get_user_recent_stats(user_df, time_window_hours):
    window_start = current_time - pd.Timedelta(hours=time_window_hours)
    recent_df = user_df[user_df['event_time'] >= window_start]
    return pd.Series({
        f'最近{time_window_hours}h行为数': len(recent_df),
        f'最近{time_window_hours}h消费金额': recent_df['amount'].sum(),
        f'最近{time_window_hours}h购买数': len(recent_df[recent_df['event_type'] == 'purchase']),
        f'最近{time_window_hours}h浏览数': len(recent_df[recent_df['event_type'] == 'view'])
    })

recent_features = df.groupby('user_id').apply(lambda x: get_user_recent_stats(x, 1)).round(0)
user_features = user_features.join(recent_features)

recent_features_6h = df.groupby('user_id').apply(lambda x: get_user_recent_stats(x, 6)).round(0)
user_features = user_features.join(recent_features_6h)

print(user_features.to_string())

# 3. 计算滚动购买转化率
print("\\n3. 滚动购买转化率分析:")
df_sorted = df.sort_values('event_time').reset_index(drop=True)

# 对每个时间点，计算过去1小时内的浏览->加购->购买转化率
conversion_data = []

for idx, row in df_sorted.iterrows():
    current_time = row['event_time']
    window_start = current_time - pd.Timedelta(hours=1)
    
    window_events = df_sorted[(df_sorted['event_time'] >= window_start) & (df_sorted['event_time'] <= current_time)]
    
    view_count = len(window_events[window_events['event_type'] == 'view'])
    add_cart_count = len(window_events[window_events['event_type'] == 'add_cart'])
    purchase_count = len(window_events[window_events['event_type'] == 'purchase'])
    
    view_to_cart_rate = (add_cart_count / view_count * 100) if view_count > 0 else 0
    cart_to_purchase_rate = (purchase_count / add_cart_count * 100) if add_cart_count > 0 else 0
    view_to_purchase_rate = (purchase_count / view_count * 100) if view_count > 0 else 0
    
    conversion_data.append({
        '时间点': current_time,
        '浏览数': view_count,
        '加购数': add_cart_count,
        '购买数': purchase_count,
        '浏览->加购率(%)': round(view_to_cart_rate, 1),
        '加购->购买率(%)': round(cart_to_purchase_rate, 1),
        '浏览->购买率(%)': round(view_to_purchase_rate, 1)
    })

conversion_df = pd.DataFrame(conversion_data).drop_duplicates(subset=['时间点'])
print(conversion_df.to_string(index=False))

# 4. 识别用户最近浏览和购买的商品特征
print("\\n4. 用户最近行为特征:")
user_last_actions = df.groupby('user_id').agg({
    'event_type': 'last',
    'product_id': 'last',
    'amount': 'last',
    'event_time': 'last'
})
user_last_actions.columns = ['最后行为类型', '最后商品ID', '最后金额', '最后时间']
print(user_last_actions.to_string())

# 5. 支付方式统计
print("\\n5. 支付方式分布:")
payment_stats = df[df['event_type'] == 'purchase']['payment_method'].value_counts()
print(payment_stats)

print("\\n" + "=" * 50)
print("分析完成!")
print("=" * 50)
`;

        const parseCSV = (csv) => {
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',');
            const rows = lines.slice(1, 21).map(line => {
                const values = line.split(',');
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = values[index];
                });
                return obj;
            });
            return { headers, rows };
        };
        
        const { headers, rows } = parseCSV(csvData);
        
        createApp({
            setup() {
                const code = ref(loadCode(projectId) || defaultCode);
                const output = ref([]);
                const isRunning = ref(false);
                const isCompletedStatus = ref(isCompleted(projectId));
                const showAnswer = ref(false);
                let editor = null;
                
                const addOutput = (type, content) => {
                    output.value.push({
                        type,
                        content,
                        id: Date.now()
                    });
                };
                
                const handleRun = async () => {
                    isRunning.value = true;
                    output.value = [];
                    addOutput('info', '正在运行代码...');
                    
                    try {
                        await runCode(code.value, (result) => {
                            if (result.type === 'text') {
                                addOutput('text', result.content);
                            } else if (result.type === 'table') {
                                addOutput('table', result.content);
                            } else if (result.type === 'error') {
                                addOutput('error', result.content);
                            }
                        });
                    } catch (error) {
                        addOutput('error', String(error));
                    } finally {
                        isRunning.value = false;
                    }
                };
                
                const handleReset = () => {
                    code.value = defaultCode;
                    if (editor) {
                        editor.setValue(defaultCode);
                    }
                    saveCode(projectId, defaultCode);
                };
                
                const handleShowAnswer = () => {
                    showAnswer.value = !showAnswer.value;
                    if (showAnswer.value) {
                        code.value = answerCode;
                        if (editor) {
                            editor.setValue(answerCode);
                        }
                    } else {
                        code.value = loadCode(projectId) || defaultCode;
                        if (editor) {
                            editor.setValue(loadCode(projectId) || defaultCode);
                        }
                    }
                };
                
                const handleComplete = () => {
                    markCompleted(projectId);
                    isCompletedStatus.value = true;
                };
                
                const handleCodeChange = (newCode) => {
                    code.value = newCode;
                    saveCode(projectId, newCode);

                                indentUnit: 4,
                                tabSize: 4,
                                indentWithTabs: false,
                                lineWrapping: true,
                                autoCloseBrackets: true,
                                matchBrackets: true
                            });
                            
                            editor.setValue(code.value);
                            
                            editor.on('change', () => {
                                handleCodeChange(editor.getValue());
                            });
                        }
                    }
                });
