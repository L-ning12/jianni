# 基于最近购买时间、购买频率和消费金额进行用户分层

import pandas as pd
import numpy as np

# 转换日期格式
df['order_date'] = pd.to_datetime(df['order_date'])

# 计算RFM值
reference_date = df['order_date'].max() + pd.Timedelta(days=1)

rfm = df.groupby('user_id').agg({
    'order_date': lambda x: (reference_date - x.max()).days,  # Recency
    'user_id': 'count',  # Frequency
    'amount': 'sum'  # Monetary
}).rename(columns={
    'order_date': 'Recency',
    'user_id': 'Frequency',
    'amount': 'Monetary'
}).reset_index()

# 计算分位数
rfm['R_quantile'] = pd.qcut(rfm['Recency'], 4, labels=[4, 3, 2, 1])  # 注意：Recency越小越好，所以标签反转
rfm['F_quantile'] = pd.qcut(rfm['Frequency'], 4, labels=[1, 2, 3, 4])
rfm['M_quantile'] = pd.qcut(rfm['Monetary'], 4, labels=[1, 2, 3, 4])

# 计算RFM总分
rfm['RFM_Score'] = rfm['R_quantile'].astype(int) + rfm['F_quantile'].astype(int) + rfm['M_quantile'].astype(int)

# 基于总分进行分层
rfm['Segment'] = pd.cut(rfm['RFM_Score'], 
                       bins=[0, 6, 8, 10, 12], 
                       labels=['低价值用户', '一般价值用户', '高价值用户', '超级用户'])

# 显示结果
print("RFM分层结果：")
print(rfm)

# 存储结果以便显示
df_names = ['rfm']
</textarea>
