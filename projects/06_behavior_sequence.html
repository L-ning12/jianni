        const parseCSV = (csv) => {
            const lines = csv.trim().split('\n');
            const headers = lines[0].split(',');
            const rows = lines.slice(1, 21).map(line => {
                const values = line.split(',');
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = values[index];
                });
                return obj;
            });
            return { headers, rows };
        };

                            } else if (result.type === 'table') {
                                addOutput('table', result.content);
                            } else if (result.type === 'error') {

                                    <button @click="handleRun" :disabled="isRunning" class="px-6 py-2 btn-primary text-white rounded-lg text-sm font-medium flex items-center gap-2">
                                        <svg v-if="isRunning" class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                                        </svg>
                                        {{ isRunning ? '运行中...' : '运行代码' }}
                                    </button>
                                </div>
                            </div>
                            <div class="bg-slate-800/50 backdrop-blur-sm rounded-2xl border border-slate-700/50 overflow-hidden">
                                <textarea id="code-editor"></textarea>
                            </div>
                        </section>
                        
                        <!-- Output Console -->
                        <section class="mb-8">
                            <h2 class="text-xl font-bold text-white mb-4">输出控制台</h2>
                            <div class="bg-slate-900 rounded-2xl border border-slate-700 p-6 max-h-96 overflow-y-auto">
                                <div v-if="output.length === 0" class="text-slate-500 text-center py-8">
                                    运行代码后输出将显示在这里
                                </div>
                                <div v-for="item in output" :key="item.id" class="mb-4 last:mb-0">
                                    <div v-if="item.type === 'info'" class="text-blue-400 text-sm">{{ item.content }}</div>
                                    <div v-else-if="item.type === 'text'" class="text-slate-300 text-sm whitespace-pre-wrap font-mono">{{ item.content }}</div>
                                    <div v-else-if="item.type === 'table'" v-html="item.content" class="overflow-x-auto"></div>
                                    <div v-else-if="item.type === 'error'" class="text-red-400 text-sm whitespace-pre-wrap font-mono">{{ item.content }}</div>
                                </div>
                            </div>
                        </section>
                        
                        <!-- Complete Button -->
                        <section class="text-center">
                            <button v-if="!isCompletedStatus" @click="handleComplete" class="px-8 py-3 bg-green-600 hover:bg-green-500 text-white rounded-xl font-semibold flex items-center gap-2 mx-auto transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                </svg>
                                标记完成
                            </button>
                            <div v-else class="px-8 py-3 bg-green-900/30 border border-green-700/50 text-green-400 rounded-xl font-semibold flex items-center gap-2 mx-auto justify-center">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                </svg>
                                项目已完成
                            </div>
                        </section>
                    </main>
                </div>
            \`
        }).mount('#app');
    </script>
</body>
</html>
